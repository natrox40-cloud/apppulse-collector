name: Daily App Review Collection

on:
  schedule:
    # 매일 새벽 3시 KST (UTC 18:00 전날)
    - cron: '0 18 * * *'
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily collection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_daily.py

      - name: Run weekly report (Monday only)
        if: github.event.schedule && contains('1', steps.date.outputs.day_of_week)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_weekly.py || echo "Weekly report skipped or failed"
